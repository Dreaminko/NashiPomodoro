name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release version
        id: version
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${MANUAL_TAG}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must use a version such as v1.0.0 or v1.0.0-beta.1" >&2
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "name=${release_tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.version.outputs.tag }}

      - name: Verify checked out commit matches release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"

          if [[ "${tag_commit}" != "${head_commit}" ]]; then
            echo "Checked out commit ${head_commit} does not match ${RELEASE_TAG} (${tag_commit})." >&2
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36.1"

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for value in \
            "${KEYSTORE_BASE64}" \
            "${KEYSTORE_PASSWORD}" \
            "${KEY_ALIAS}" \
            "${KEY_PASSWORD}"; do
            if [[ -z "${value}" ]]; then
              echo "One or more Android signing secrets are missing." >&2
              exit 1
            fi
          done

      - name: Restore release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "${KEYSTORE_BASE64}" \
            | base64 --decode \
            > "${RUNNER_TEMP}/nashipomodoro-release.keystore"

      - name: Verify project and build signed APK
        env:
          RELEASE_VERSION_NAME: ${{ steps.version.outputs.name }}
          RELEASE_VERSION_CODE: ${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nashipomodoro-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest :app:assembleRelease --no-daemon

      - name: Prepare release files
        id: files
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/NashiPomodoro-${RELEASE_TAG}.apk"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            if gh release view "${RELEASE_TAG}" --json assets --jq '.assets | length > 0' | grep -q '^true$'; then
              echo "Release ${RELEASE_TAG} already has published assets. Refusing to overwrite existing artifacts." >&2
              exit 1
            fi

            gh release upload "${RELEASE_TAG}" dist/*
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "NashiPomodoro ${RELEASE_TAG}" \
              --generate-notes
          fi
